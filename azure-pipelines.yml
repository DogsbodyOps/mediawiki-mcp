# Pipeline file to build and push the mediawiki-mcp Docker image to GitHub Container Registry.

trigger:
  branches:
    include:
      - releases/*
pool:
  vmImage: 'ubuntu-latest'
steps:
- task: Docker@2
  displayName: Build and Push Docker Image
  inputs:
    command: 'buildAndPush'
    repository: 'ghcr.io/dogsbodyops/mediawiki-mcp'
    dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
    tags: '$(Build.SourceBranchName)'
    containerRegistry: 'GitHubContainerRegistry'
- bash: |
    BRANCH=$(echo "$(Build.SourceBranch)" | sed 's|refs/heads/||')
    VERSION=$(Build.SourceBranchName)
    curl -s -X POST \
      -H "Authorization: Bearer $(GITHUB_PAT)" \
      -H "Accept: application/vnd.github+json" \
      https://api.github.com/repos/DogsbodyOps/mediawiki-mcp/pulls \
      -d "{
        \"title\": \"Release $VERSION\",
        \"head\": \"$BRANCH\",
        \"base\": \"main\",
        \"body\": \"Automated release PR — Docker image \`ghcr.io/dogsbodyops/mediawiki-mcp:$VERSION\` has been built and pushed.\"
      }"
  displayName: Open PR to main
  env:
    GITHUB_PAT: $(GITHUB_PAT)
